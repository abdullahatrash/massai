services:
  postgres:
    image: postgres:16-alpine
    container_name: massai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-massai_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-massai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-massai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-massai} -d ${POSTGRES_DB:-massai_monitoring}"]
      interval: 10s
      timeout: 5s
      retries: 6

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: massai-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./user-service/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  keycloak-setup:
    image: python:3.12-slim
    container_name: massai-keycloak-setup
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      SEED_USERS_FILE: /work/seed-users.json
    volumes:
      - ./user-service:/work:ro
    working_dir: /work
    command:
      - sh
      - /work/setup.sh
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: massai-backend
    working_dir: /app
    command:
      - sh
      - -lc
      - uv sync --no-dev && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://massai:massai@postgres:5432/massai_monitoring}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BLOCKCHAIN_ADAPTER: ${BLOCKCHAIN_ADAPTER:-mock}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      KEYCLOAK_VALID_ISSUERS: http://keycloak:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-massai},http://localhost:${KEYCLOAK_PORT:-8080}/realms/${KEYCLOAK_REALM:-massai}
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: massai-frontend
    working_dir: /app
    command:
      - sh
      - -lc
      - pnpm install && pnpm run dev -- --host 0.0.0.0 --port ${PORT:-3000}
    environment:
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      PORT: ${FRONTEND_PORT:-3000}
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      VITE_ENABLE_SIMULATOR: ${VITE_ENABLE_SIMULATOR:-true}
      VITE_PROVIDER_E4M_CLIENT_SECRET: ${PROVIDER_E4M_CLIENT_SECRET:-provider-e4m-sa-secret}
      VITE_PROVIDER_FACTOR_CLIENT_SECRET: ${PROVIDER_FACTOR_CLIENT_SECRET:-provider-factor-sa-secret}
      VITE_PROVIDER_TASOWHEEL_CLIENT_SECRET: ${PROVIDER_TASOWHEEL_CLIENT_SECRET:-provider-tasowheel-sa-secret}
      VITE_KEYCLOAK_CLIENT_ID: massai-frontend
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      VITE_KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8080}
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  mock-factor:
    build:
      context: ./mock-sensors
    container_name: massai-mock-factor
    command: ["python", "factor_simulator.py"]
    working_dir: /app
    environment:
      API_URL: ${API_URL:-http://backend:8000}
      CONTRACT_ID: contract-factor-001
      SIMULATOR_NAME: factor
      SCENARIO: ${FACTOR_SCENARIO:-normal}
      INTERVAL_SECONDS: ${SIMULATOR_INTERVAL_SECONDS:-15}
      STOP_AFTER_STEPS: ${SIMULATOR_STOP_AFTER_STEPS:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      KEYCLOAK_CLIENT_ID: provider-factor-sa
      KEYCLOAK_CLIENT_SECRET: ${PROVIDER_FACTOR_CLIENT_SECRET:-provider-factor-sa-secret}
    volumes:
      - ./mock-sensors:/app
    depends_on:
      backend:
        condition: service_healthy

  mock-tasowheel:
    build:
      context: ./mock-sensors
    container_name: massai-mock-tasowheel
    command: ["python", "tasowheel_simulator.py"]
    working_dir: /app
    environment:
      API_URL: ${API_URL:-http://backend:8000}
      CONTRACT_ID: contract-tasowheel-001
      SIMULATOR_NAME: tasowheel
      SCENARIO: ${TASOWHEEL_SCENARIO:-normal}
      INTERVAL_SECONDS: ${SIMULATOR_INTERVAL_SECONDS:-15}
      STOP_AFTER_STEPS: ${SIMULATOR_STOP_AFTER_STEPS:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      KEYCLOAK_CLIENT_ID: provider-tasowheel-sa
      KEYCLOAK_CLIENT_SECRET: ${PROVIDER_TASOWHEEL_CLIENT_SECRET:-provider-tasowheel-sa-secret}
    volumes:
      - ./mock-sensors:/app
    depends_on:
      backend:
        condition: service_healthy

  mock-e4m:
    build:
      context: ./mock-sensors
    container_name: massai-mock-e4m
    command: ["python", "e4m_simulator.py"]
    working_dir: /app
    environment:
      API_URL: ${API_URL:-http://backend:8000}
      CONTRACT_ID: contract-e4m-001
      SIMULATOR_NAME: e4m
      SCENARIO: ${E4M_SCENARIO:-normal}
      INTERVAL_SECONDS: ${SIMULATOR_INTERVAL_SECONDS:-15}
      STOP_AFTER_STEPS: ${SIMULATOR_STOP_AFTER_STEPS:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      KEYCLOAK_CLIENT_ID: provider-e4m-sa
      KEYCLOAK_CLIENT_SECRET: ${PROVIDER_E4M_CLIENT_SECRET:-provider-e4m-sa-secret}
    volumes:
      - ./mock-sensors:/app
    depends_on:
      backend:
        condition: service_healthy

  simulator-studio:
    build:
      context: .
      dockerfile: simulator-studio/Dockerfile
    container_name: massai-simulator-studio
    working_dir: /workspace/simulator-studio
    environment:
      SIM_STUDIO_DB_PATH: /data/simulator-studio.db
      MASSAI_API_BASE_URL: http://backend:8000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-massai}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      MASSAI_OIDC_CLIENT_ID: massai-frontend
      MASSAI_OPERATOR_USERNAME: ${MASSAI_OPERATOR_USERNAME:-admin@test.com}
      MASSAI_OPERATOR_PASSWORD: ${MASSAI_OPERATOR_PASSWORD:-password}
      MASSAI_FRONTEND_BASE_URL: http://localhost:${FRONTEND_PORT:-3000}
      PROVIDER_FACTOR_CLIENT_SECRET: ${PROVIDER_FACTOR_CLIENT_SECRET:-provider-factor-sa-secret}
      PROVIDER_TASOWHEEL_CLIENT_SECRET: ${PROVIDER_TASOWHEEL_CLIENT_SECRET:-provider-tasowheel-sa-secret}
      PROVIDER_E4M_CLIENT_SECRET: ${PROVIDER_E4M_CLIENT_SECRET:-provider-e4m-sa-secret}
    volumes:
      - simulator-studio-data:/data
    ports:
      - "${SIMULATOR_STUDIO_PORT:-3001}:8501"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501')"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  frontend-node-modules:
  backend-venv:
  simulator-studio-data:
