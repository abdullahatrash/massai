<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaaSAI Frontend Scaffold</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe7;
        --panel: rgba(255, 255, 255, 0.88);
        --ink: #17211f;
        --accent: #0f766e;
        --muted: #5f6f6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.18), transparent 32%),
          radial-gradient(circle at left center, rgba(245, 158, 11, 0.16), transparent 28%),
          linear-gradient(135deg, #f7f4ed 0%, #ece5d8 100%);
      }

      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid rgba(23, 33, 31, 0.08);
        border-radius: 28px;
        padding: 40px;
        box-shadow: 0 30px 70px rgba(23, 33, 31, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 4vw, 4rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 14px;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        margin-bottom: 20px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.12);
        color: var(--accent);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Epic E1 Scaffold</span>
      <h1>MaaSAI Frontend Placeholder</h1>
      <p>The consumer dashboard will land in a later frontend epic.</p>
      <p>This page exists so the development stack can boot end-to-end while the FastAPI backend and infrastructure are put in place.</p>
    </main>
  </body>
</html>
